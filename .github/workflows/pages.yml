name: pages-demo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'xau_lfx/**'
      - 'examples/sample-data/**'
      - 'examples/sample-artifacts/**'
      - '.github/workflows/pages.yml'
      - 'pyproject.toml'
      - 'README.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest
      - run: python -m xau_lfx.pipeline run-once --input-dir examples/sample-data --event-file examples/sample-data/usd_events.csv --out-dir artifacts
      - run: python -m xau_lfx.pipeline report --artifact-dir artifacts --write-md
      - run: python -m xau_lfx.pipeline site --artifact-dir artifacts --out-dir site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
